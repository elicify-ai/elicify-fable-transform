name: CLA Assistant

# Gates pull requests on a signed Contributor License Agreement.
# The CLA text lives in CLA.md; signatures are recorded in-repo in the
# `cla-signatures` branch (signatures/version1/cla.json). No third-party app is
# used — this runs entirely as a GitHub Action with the built-in GITHUB_TOKEN.
#
# No setup secret is required: signatures are stored in this same repository's
# `cla-signatures` branch, so the workflow's built-in token (granted
# `contents: write` below) is sufficient. The branch is seeded once with an empty
# ledger (signatures/version1/cla.json = {"signedContributors":[]}).

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Assistant
    runs-on: ubuntu-latest
    if: >
      (github.event.issue.pull_request && contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
      || contains(github.event.comment.body, 'recheck')
      || github.event_name == 'pull_request_target'
    steps:
      - name: Check / record CLA signature
        # contributor-assistant/github-action v2.6.1 (pinned to commit SHA)
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'cla-signatures'
          path-to-document: 'https://github.com/elicify-ai/elicify-vertex/blob/main/CLA.md'
          custom-notsigned-prcomment: 'Thanks for your pull request! Before we can merge it, please read our [Contributor License Agreement (CLA)](https://github.com/elicify-ai/elicify-vertex/blob/main/CLA.md) and sign it by posting the comment below in this pull request.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          # Bots + elicify.ai maintainers (employment/contract). AI assistant
          # names are not copyright holders; repo policy still discourages agent
          # Co-Authored-By trailers on product commits.
          allowlist: 'dependabot[bot],dependabot-preview[bot],github-actions[bot],renovate[bot],daniel-piatkowski-ai,Claude,*[bot]'
          lock-pullrequest-aftermerge: false
